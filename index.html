<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Segal Deudores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..600;1,8..60,300..600&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,300..600&family=DM+Sans:wght@300;400;500;600&family=Instrument+Serif&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      /* Initial splash — visible until React mounts and replaces #root. */
      #fj-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px; background: #f5f6f8;
        font-family: "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
      }
      #fj-splash .fj-spin-wrap { position: relative; width: 56px; height: 56px; }
      #fj-splash .fj-spin-track { position: absolute; inset: 0; border-radius: 50%; border: 4px solid #e1e4eb; }
      #fj-splash .fj-spin {
        position: absolute; inset: 0; border-radius: 50%;
        border: 4px solid transparent; border-top-color: #1e4dbb;
        animation: fj-rot .8s linear infinite;
      }
      #fj-splash .fj-mark {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        font-weight: 600; font-size: 15px; letter-spacing: .04em; color: #1e4dbb;
      }
      #fj-splash .fj-label {
        font-size: 12.5px; letter-spacing: .14em; text-transform: uppercase;
        color: #6b7686; font-weight: 500;
      }
      @keyframes fj-rot { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { #fj-splash .fj-spin { animation-duration: 2s; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="fj-splash">
        <div class="fj-spin-wrap">
          <div class="fj-spin-track"></div>
          <div class="fj-spin"></div>
          <div class="fj-mark">SD</div>
        </div>
        <div class="fj-label">Cargando gestión judicial</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
